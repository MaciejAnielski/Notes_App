<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <title>Notes App</title>
    <!-- variables first — all other files depend on its custom properties -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/toolbar.css">
    <link rel="stylesheet" href="css/file-list.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/preview.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="stylesheet" href="css/schedule.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/diagrams.css">
    <link rel="stylesheet" href="css/graph.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/profiles.css">
    <!-- responsive last — breakpoints override component defaults -->
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="001_Assets/favicon.ico" type="image/x-icon">
    <script defer src="vendor/jszip.min.js"></script>
    <script defer src="vendor/marked.min.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          packages: {'[+]': ['ams']}
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script defer src="vendor/tex-chtml-full.js"></script>
    <script defer src="vendor/mermaid.min.js"></script>
    <!-- vis-network.min.js is lazy-loaded on demand (graph view only) -->
    <link rel="stylesheet" href="vendor/vis-network.min.css">
    <!-- Mermaid theme bridge — defines _buildMermaidThemeVars() and
         reinitMermaidTheme() globals used by theme-engine.js and
         markdown-renderer.js. Loaded non-deferred so the globals exist
         before any deferred script that calls them executes. -->
    <script src="js/ui/mermaid-theme.js"></script>

</head>

<body>

    <!-- macOS: full-width drag strip that sits behind all toolbar content.
         -webkit-app-region:drag on this element lets the user drag the window
         by clicking on any empty area of the toolbar row. Buttons and inputs
         within #button-container override it with no-drag so clicks still work.
         Only visible/active on macOS (body.platform-darwin), see styles.css. -->
    <div id="window-drag-region"></div>

    <!-- Loading screen: shown immediately, dismissed after async init completes -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-title">Notes</div>
        <div class="loading-progress-container">
          <div class="loading-progress-bar" id="loading-progress-bar"></div>
        </div>
        <div class="loading-progress-label" id="loading-progress-label">Starting&hellip;</div>
      </div>
    </div>

    <div id="button-container" class="storage-controls">

        <!-- macOS traffic lights — custom HTML inside the pill so they float
             with it.  Hidden by default; body.platform-darwin shows them.
             Closed/minimized/zoomed via Electron IPC (see app-init.js). -->
        <div id="traffic-lights">
            <button id="btn-close"    class="traffic-btn" title="Close"></button>
            <button id="btn-minimize" class="traffic-btn" title="Minimize"></button>
            <button id="btn-maximize" class="traffic-btn" title="Zoom"></button>
        </div>

        <div class="button-group" id="profile-avatar-group">
            <button id="profile-avatar-btn" class="profile-avatar"
                    aria-haspopup="true" aria-expanded="false"
                    title="Switch profile"></button>
            <div id="profile-dropdown" class="profile-dropdown" role="menu" hidden></div>
        </div>

        <div class="button-group">
            <button id="new-note">New</button>
        </div>
        <div class="button-group">
            <button id="delete-note">Delete</button>
            <div class="sub-buttons">
                <button id="delete-selected" class="sub-button">Filtered</button>
                <button id="delete-all" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="export-note">Export</button>
            <div class="sub-buttons">
                <button id="export-selected" class="sub-button">Filtered</button>
                <button id="export-all-html" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="import-zip">Import</button>
            <input type="file" id="import-zip-input" accept=".zip,.md" multiple style="display:none;">
        </div>
        <div class="button-group tools-collapsible">
            <button id="download-all">Backup</button>
        </div>
        <div class="button-group tools-collapsible">
            <button id="find-btn">Find</button>
        </div>
        <div class="button-group">
            <button id="toggle-view">View</button>
        </div>

    </div>

    <div id="tools-overflow-row"></div>

    <div id="content-area">
      <div id="editor-section">
        <textarea id="editor" placeholder="Start with # to name your note..."></textarea>
        <div id="preview" style="display:none;"></div>
        <div id="bottom-status-area">
          <div id="status-message"></div>
        </div>
      </div>

      <div id="panel-lists">
        <button id="panel-pin" title="Pin panel">
          <svg width="11" height="14" viewBox="0 0 11 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="5.5" y1="8" x2="5.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="files-container" class="active">
          <h2>Notes</h2>
          <input type="text" id="searchBox" placeholder="Search Notes...">
          <ul id="fileList"></ul>
          <ul id="nav-list"></ul>
        </div>
        <div id="todo-container">
          <h2>Tasks</h2>
          <input type="text" id="searchTasksBox" placeholder="Search Tasks...">
          <ul id="todoList"></ul>
        </div>
        <div id="schedule-container">
          <h2>Schedule</h2>
          <div id="schedule-week-row"></div>
          <div class="schedule-date-row">
            <button id="schedule-prev" title="Previous week">&lsaquo;</button>
            <span id="schedule-date-label"></span>
            <button id="schedule-next" title="Next week">&rsaquo;</button>
          </div>
          <div id="schedule-timeline-wrapper">
            <div id="scheduleGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <button id="panel-arrow" aria-label="Switch panel">&#8250;</button>
    <button id="panel-open-btn" title="Open panel" aria-label="Open panel">
      <svg width="14" height="12" viewBox="0 0 14 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0.75" y="0.75" width="12.5" height="10.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="9.5" y1="0.75" x2="9.5" y2="11.25" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>

    <!-- Mobile right panel for Tasks/Schedule -->
    <div id="mobile-right-panel"></div>
    <div id="mobile-overlay"></div>

  <!-- Wiki-link autocomplete dropdown -->
  <div id="wikilink-dropdown" style="display:none" role="listbox" aria-label="Note suggestions"></div>

  <!-- Global Search & Replace Panel -->
  <div id="global-search-panel" class="gs-hidden">
    <div class="gs-row">
      <input type="text" id="gs-search-input" placeholder="Search all notes&hellip;" autocomplete="off" spellcheck="false">
      <span id="gs-status"></span>
      <button id="gs-find-btn">Find</button>
      <button id="gs-close" title="Close (Esc)">&#x2715;</button>
    </div>
    <div class="gs-row">
      <input type="text" id="gs-replace-input" placeholder="Replace with&hellip;" autocomplete="off" spellcheck="false">
      <button id="gs-replace-btn">Replace</button>
      <button id="gs-replace-all-btn">All</button>
      <label id="gs-case-label" title="Case sensitive"><input type="checkbox" id="gs-case-checkbox"> Aa</label>
    </div>
    <ul id="gs-results"></ul>
  </div>

  <!-- App scripts — see web/js/ for the folder layout. The load order is load-bearing:
       storage & crypto come first so NoteStorage / CryptoStorage globals exist before
       app-state.js runs; app-init.js runs last to wire up event handlers. -->
  <script src="js/ui/theme-engine.js"></script>
  <script>
    // On Desktop (Electron) or iOS (Capacitor), load PowerSync + Supabase for cloud sync.
    // On plain web, skip these — IndexedDB is used instead (no sync).
    if (window.electronAPI || window.Capacitor?.isNativePlatform()) {
      document.write('<script src="js/storage/powersync-config.js"><\/script>');
      document.write('<script type="module" src="vendor/powersync-bundle.min.js"><\/script>');
      document.write('<script type="module" src="js/storage/powersync-storage.js"><\/script>');
    }
  </script>

  <!-- Shared low-level utilities (must load before encryption + core state) -->
  <script defer src="js/utils/binary.js"></script>

  <!-- Storage (IndexedDB note store + E2E encryption) -->
  <script defer src="js/storage/storage.js"></script>
  <script defer src="js/encryption/crypto-engine.js"></script>
  <script defer src="js/encryption/key-storage.js"></script>
  <script defer src="js/encryption/crypto-storage.js"></script>
  <script defer src="js/encryption/device-pairing.js"></script>

  <!-- Multi-profile support (must load before app-init's bootstrap call) -->
  <script defer src="js/profiles/profile-store.js"></script>
  <script defer src="js/profiles/profile-session-vault.js"></script>
  <script defer src="js/profiles/profile-storage-wrapper.js"></script>
  <script defer src="js/profiles/profile-switcher.js"></script>
  <script defer src="js/profiles/profile-toolbar-avatar.js"></script>
  <script defer src="js/profiles/profile-settings-injection.js"></script>

  <!-- Core app state (DOM refs, shared variables) -->
  <script defer src="js/core/app-state.js"></script>
  <script defer src="js/utils/sanitize.js"></script>

  <!-- Editor / preview rendering -->
  <script defer src="js/editor/markdown-renderer.js"></script>
  <script defer src="js/editor/syntax-highlight.js"></script>
  <script defer src="js/editor/math-eval.js"></script>

  <!-- Schedule + calendar sync -->
  <script defer src="js/schedule/schedule.js"></script>
  <script defer src="js/schedule/schedule-drag.js"></script>
  <script defer src="js/schedule/calendar-sync.js"></script>

  <!-- Note CRUD, file list, search, export/import -->
  <script defer src="js/notes/file-list.js"></script>
  <script defer src="js/notes/note-manager.js"></script>
  <script defer src="js/notes/export-import.js"></script>
  <script defer src="js/notes/global-search.js"></script>

  <!-- UI widgets -->
  <script defer src="js/ui/graph-view.js"></script>
  <script defer src="js/ui/notifications.js"></script>

  <!-- Wires everything up (must run after all of the above) -->
  <script defer src="js/core/app-init.js"></script>
  <script defer src="js/editor/table-features.js"></script>
  <!-- Stable top-level namespace for external consumers (loads last). -->
  <script defer src="js/core/app-facade.js"></script>
</body>
</html>
