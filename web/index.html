<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <title>Notes App</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="001_Assets/favicon.ico" type="image/x-icon">
    <script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          packages: {'[+]': ['ams']}
        },
        chtml: {
          // Disable automatic line-breaking — long equations scroll horizontally
          // instead of being broken across multiple lines.
          linebreaks: { automatic: false }
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vis-network@9/dist/dist/vis-network.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/vis-network@9/dist/vis-network.min.js"></script>
    <script>
      // Mermaid initialized with a custom theme matching the app's dark purple palette.
      window.addEventListener('load', () => {
        if (window.mermaid) {
          mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            darkMode: true,
            securityLevel: 'strict',
            fontFamily: 'Arial, sans-serif',
            themeVariables: {
              // ── Core ──────────────────────────────────────────────
              darkMode: true,
              background:          '#1e1e1e',
              primaryColor:        '#2e2e2e',
              primaryTextColor:    '#e8dcf4',
              primaryBorderColor:  '#a272b0',
              lineColor:           '#a272b0',
              // ── Secondary / tertiary nodes ─────────────────────────
              secondaryColor:      '#262030',
              secondaryTextColor:  '#e8dcf4',
              secondaryBorderColor:'#7a5a8a',
              tertiaryColor:       '#2a2040',
              tertiaryTextColor:   '#e8dcf4',
              tertiaryBorderColor: '#6b4e7a',
              // ── Text & labels ─────────────────────────────────────
              titleColor:          '#c89fdf',
              edgeLabelBackground: '#2a2040',
              // ── Subgraphs / clusters ──────────────────────────────
              clusterBkg:          '#2a2040',
              clusterBorder:       '#6b4e7a',
              // ── Notes ─────────────────────────────────────────────
              noteBkgColor:        '#262030',
              noteTextColor:       '#e8dcf4',
              noteBorderColor:     '#a272b0',
              // ── Sequence diagrams ─────────────────────────────────
              actorBkg:            '#2e2e2e',
              actorBorder:         '#a272b0',
              actorTextColor:      '#e8dcf4',
              actorLineColor:      '#a272b0',
              signalColor:         '#c89fdf',
              signalTextColor:     '#e8dcf4',
              labelBoxBkgColor:    '#2a2040',
              labelBoxBorderColor: '#a272b0',
              labelTextColor:      '#e8dcf4',
              loopTextColor:       '#e8dcf4',
              activationBorderColor:'#c89fdf',
              activationBkgColor:  '#3a1060',
              sequenceNumberColor: '#e8dcf4',
              // ── Gantt charts ──────────────────────────────────────
              gridColor:           '#3a2a4a',
              todayLineColor:      '#e05c5c',
              taskBkgColor:        '#2e2e2e',
              taskBorderColor:     '#a272b0',
              taskTextColor:       '#e8dcf4',
              taskTextOutsideColor:'#e8dcf4',
              taskTextLightColor:  '#e8dcf4',
              activeTaskBkgColor:  '#3a1060',
              activeTaskBorderColor:'#c89fdf',
              doneTaskBkgColor:    '#1a3a2a',
              doneTaskBorderColor: '#4caf72',
              critBkgColor:        '#3a1a1a',
              critBorderColor:     '#e05c5c',
              critTextColor:       '#e8dcf4',
              // ── Git graphs ────────────────────────────────────────
              git0: '#a272b0', git1: '#9cdcfe', git2: '#4caf72',
              git3: '#d4a24a', git4: '#c89fdf', git5: '#e05c5c',
              git6: '#7a5a8a', git7: '#262030',
              gitBranchLabel0: '#e8dcf4', gitBranchLabel1: '#1e1e1e',
              gitBranchLabel2: '#1e1e1e', gitBranchLabel3: '#1e1e1e',
              gitBranchLabel4: '#1e1e1e', gitBranchLabel5: '#e8dcf4',
              gitBranchLabel6: '#e8dcf4', gitBranchLabel7: '#e8dcf4',
              gitInv0: '#e8dcf4', gitInv1: '#1e1e1e', gitInv2: '#1e1e1e',
              gitInv3: '#1e1e1e', gitInv4: '#1e1e1e', gitInv5: '#e8dcf4',
              gitInv6: '#e8dcf4', gitInv7: '#e8dcf4'
            }
          });
        }
      });
    </script>

</head>

<body>

    <div id="button-container" class="storage-controls">

        <div class="button-group">
            <button id="new-note">New</button>
        </div>
        <div class="button-group">
            <button id="delete-note">Delete</button>
            <div class="sub-buttons">
                <button id="delete-selected" class="sub-button">Filtered</button>
                <button id="delete-all" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="export-note">Export</button>
            <div class="sub-buttons">
                <button id="export-selected" class="sub-button">Filtered</button>
                <button id="export-all-html" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="import-zip">Import</button>
            <input type="file" id="import-zip-input" accept=".zip" style="display:none;">
        </div>
        <div class="button-group tools-collapsible">
            <button id="download-all">Backup</button>
        </div>
        <div class="button-group tools-collapsible">
            <button id="find-btn">Find</button>
        </div>
        <div class="button-group" id="tools-toggle-group">
            <button id="tools-toggle">Tools</button>
        </div>
        <div class="button-group">
            <button id="toggle-view">View</button>
        </div>

    </div>

    <div id="tools-overflow-row"></div>

    <div id="content-area">
      <div id="editor-section">
        <textarea id="editor" placeholder="Start typing here..."></textarea>
        <div id="preview" style="display:none;"></div>
        <div id="bottom-status-area">
          <div id="status-message"></div>
          <div id="last-backup-status"></div>
        </div>
      </div>

      <div id="panel-lists">
        <button id="panel-pin" title="Pin panel">
          <svg width="11" height="14" viewBox="0 0 11 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="5.5" y1="8" x2="5.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="files-container" class="active">
          <h2>Notes</h2>
          <input type="text" id="searchBox" placeholder="Search Notes...">
          <ul id="fileList"></ul>
          <ul id="nav-list"></ul>
        </div>
        <div id="todo-container">
          <h2>Tasks</h2>
          <input type="text" id="searchTasksBox" placeholder="Search Tasks...">
          <ul id="todoList"></ul>
        </div>
        <div id="schedule-container">
          <h2>Schedule</h2>
          <div id="schedule-week-row"></div>
          <div class="schedule-date-row">
            <button id="schedule-prev" title="Previous week">&lsaquo;</button>
            <span id="schedule-date-label"></span>
            <button id="schedule-next" title="Next week">&rsaquo;</button>
          </div>
          <div id="schedule-timeline-wrapper">
            <div id="scheduleGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <button id="panel-arrow" aria-label="Switch panel">&#8250;</button>

    <!-- Mobile right panel for Tasks/Schedule -->
    <div id="mobile-right-panel"></div>
    <div id="mobile-overlay"></div>

  <!-- Global Search & Replace Panel -->
  <div id="global-search-panel" class="gs-hidden">
    <div class="gs-row">
      <input type="text" id="gs-search-input" placeholder="Search all notes&hellip;" autocomplete="off" spellcheck="false">
      <span id="gs-status"></span>
      <button id="gs-find-btn">Find</button>
      <button id="gs-close" title="Close (Esc)">&#x2715;</button>
    </div>
    <div class="gs-row">
      <input type="text" id="gs-replace-input" placeholder="Replace with&hellip;" autocomplete="off" spellcheck="false">
      <button id="gs-replace-btn">Replace</button>
      <button id="gs-replace-all-btn">All</button>
      <label id="gs-case-label" title="Case sensitive"><input type="checkbox" id="gs-case-checkbox"> Aa</label>
    </div>
    <ul id="gs-results"></ul>
  </div>

  <script defer src="icloud-bridge.js"></script>
  <script defer src="storage.js"></script>
  <script defer src="app-state.js"></script>
  <script defer src="markdown-renderer.js"></script>
  <script defer src="schedule.js"></script>
  <script defer src="file-list.js"></script>
  <script defer src="note-manager.js"></script>
  <script defer src="export-import.js"></script>
  <script defer src="global-search.js"></script>
  <script defer src="graph-view.js"></script>
  <script defer src="syntax-highlight.js"></script>
  <script defer src="math-eval.js"></script>
  <script defer src="notifications.js"></script>
  <script defer src="calendar-sync.js"></script>
  <script defer src="app-init.js"></script>
</body>
</html>
