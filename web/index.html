<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <title>Notes App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="001_Assets/favicon.ico" type="image/x-icon">
    <script defer src="vendor/jszip.min.js"></script>
    <script defer src="vendor/marked.min.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          packages: {'[+]': ['ams']}
        },
        chtml: {
          // Disable automatic line-breaking — long equations scroll horizontally
          // instead of being broken across multiple lines.
          linebreaks: { automatic: false }
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script async src="vendor/tex-chtml-full.js"></script>
    <script async src="vendor/mermaid.min.js" onload="reinitMermaidTheme()"></script>
    <link rel="stylesheet" href="vendor/vis-network.min.css">
    <script async src="vendor/vis-network.min.js"></script>
    <script>
      // Build Mermaid theme variables from current CSS custom properties.
      function _buildMermaidThemeVars() {
        var s = getComputedStyle(document.documentElement);
        var v = function(p) { return (s.getPropertyValue(p) || '').trim(); };
        var bg = v('--bg') || '#1e1e1e';
        var text = v('--text') || '#e8dcf4';
        var accent = v('--accent') || '#a272b0';
        var surface = v('--surface') || '#2e2e2e';
        var blockquoteBg = v('--blockquote-bg') || '#262030';
        var tableHeaderBg = v('--table-header-bg') || '#2a2040';
        var hr = v('--hr') || '#6b4e7a';
        var activeColor = v('--active-color') || '#c89fdf';
        var headingMarker = v('--heading-marker') || '#7a5a8a';
        var schedHighlightBg = v('--sched-highlight-bg') || '#3a1060';
        var errorColor = v('--error') || '#e05c5c';
        var successColor = v('--success') || '#4caf72';
        var warningColor = v('--warning') || '#d4a24a';
        var linkColor = v('--link') || '#9cdcfe';
        var border = v('--border') || '#333';
        var mermaidText = v('--mermaid-text') || text;
        var mermaidLine = v('--mermaid-line') || border;
        return {
          darkMode: true,
          background: bg, primaryColor: surface, primaryTextColor: mermaidText,
          primaryBorderColor: accent, lineColor: mermaidLine,
          secondaryColor: blockquoteBg, secondaryTextColor: text,
          secondaryBorderColor: headingMarker,
          tertiaryColor: tableHeaderBg, tertiaryTextColor: text,
          tertiaryBorderColor: hr,
          titleColor: activeColor, edgeLabelBackground: tableHeaderBg,
          clusterBkg: tableHeaderBg, clusterBorder: hr,
          noteBkgColor: blockquoteBg, noteTextColor: text, noteBorderColor: accent,
          actorBkg: surface, actorBorder: accent, actorTextColor: text,
          actorLineColor: accent, signalColor: activeColor, signalTextColor: text,
          labelBoxBkgColor: tableHeaderBg, labelBoxBorderColor: accent,
          labelTextColor: text, loopTextColor: text,
          activationBorderColor: activeColor, activationBkgColor: schedHighlightBg,
          sequenceNumberColor: text,
          gridColor: mermaidLine, gridTextColor: mermaidText, todayLineColor: errorColor,
          excludeBkgColor: surface,
          taskBkgColor: surface, taskBorderColor: accent,
          taskTextColor: text, taskTextOutsideColor: text, taskTextLightColor: text,
          activeTaskBkgColor: schedHighlightBg, activeTaskBorderColor: activeColor,
          doneTaskBkgColor: successColor, doneTaskBorderColor: successColor,
          critBkgColor: errorColor, critBorderColor: errorColor, critTextColor: text,
          git0: accent, git1: linkColor, git2: successColor,
          git3: warningColor, git4: activeColor, git5: errorColor,
          git6: headingMarker, git7: blockquoteBg,
          gitBranchLabel0: text, gitBranchLabel1: bg,
          gitBranchLabel2: bg, gitBranchLabel3: bg,
          gitBranchLabel4: bg, gitBranchLabel5: text,
          gitBranchLabel6: text, gitBranchLabel7: text,
          gitInv0: text, gitInv1: bg, gitInv2: bg,
          gitInv3: bg, gitInv4: bg, gitInv5: text,
          gitInv6: text, gitInv7: text
        };
      }

      function reinitMermaidTheme() {
        if (!window.mermaid) return;
        mermaid.initialize({
          startOnLoad: false, theme: 'base', darkMode: true,
          securityLevel: 'strict', fontFamily: 'Arial, sans-serif',
          logLevel: 'off', suppressErrorRendering: true,
          themeVariables: _buildMermaidThemeVars()
        });
        // Suppress mermaid error handler completely
        mermaid.setErrorHandler(() => {});
        // Suppress console errors from mermaid
        const originalError = console.error;
        const mermaidErrorPatterns = ['Mermaid', 'diagram', 'syntax'];
        console.error = function(...args) {
          const msg = args[0]?.toString?.() || '';
          if (!mermaidErrorPatterns.some(p => msg.includes(p))) {
            originalError.apply(console, args);
          }
        };
      }

      // Mermaid initialization is triggered by the onload attribute on the
      // mermaid script tag.  The load event listener is kept as a fallback in
      // case onload fires before reinitMermaidTheme is defined (unlikely but safe).
      window.addEventListener('load', function() {
        if (window.mermaid) reinitMermaidTheme();
      });
    </script>

</head>

<body>

    <!-- Loading screen: shown immediately, dismissed after async init completes -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-title">Notes</div>
        <div class="loading-spinner"></div>
      </div>
    </div>

    <div id="button-container" class="storage-controls">

        <div class="button-group">
            <button id="new-note">New</button>
        </div>
        <div class="button-group">
            <button id="delete-note">Delete</button>
            <div class="sub-buttons">
                <button id="delete-selected" class="sub-button">Filtered</button>
                <button id="delete-all" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="export-note">Export</button>
            <div class="sub-buttons">
                <button id="export-selected" class="sub-button">Filtered</button>
                <button id="export-all-html" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="import-zip">Import</button>
            <input type="file" id="import-zip-input" accept=".zip" style="display:none;">
        </div>
        <div class="button-group tools-collapsible">
            <button id="download-all">Backup</button>
        </div>
        <div class="button-group tools-collapsible">
            <button id="find-btn">Find</button>
        </div>
        <div class="button-group" id="tools-toggle-group">
            <button id="tools-toggle">Tools</button>
        </div>
        <div class="button-group">
            <button id="toggle-view">View</button>
        </div>

    </div>

    <div id="tools-overflow-row"></div>

    <div id="content-area">
      <div id="editor-section">
        <textarea id="editor" placeholder="Start typing here..."></textarea>
        <div id="preview" style="display:none;"></div>
        <div id="bottom-status-area">
          <div id="status-message"></div>
          <div id="last-backup-status"></div>
        </div>
      </div>

      <div id="panel-lists">
        <button id="panel-pin" title="Pin panel">
          <svg width="11" height="14" viewBox="0 0 11 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="5.5" y1="8" x2="5.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="files-container" class="active">
          <h2>Notes</h2>
          <input type="text" id="searchBox" placeholder="Search Notes...">
          <ul id="fileList"></ul>
          <ul id="nav-list"></ul>
        </div>
        <div id="todo-container">
          <h2>Tasks</h2>
          <input type="text" id="searchTasksBox" placeholder="Search Tasks...">
          <ul id="todoList"></ul>
        </div>
        <div id="schedule-container">
          <h2>Schedule</h2>
          <div id="schedule-week-row"></div>
          <div class="schedule-date-row">
            <button id="schedule-prev" title="Previous week">&lsaquo;</button>
            <span id="schedule-date-label"></span>
            <button id="schedule-next" title="Next week">&rsaquo;</button>
          </div>
          <div id="schedule-timeline-wrapper">
            <div id="scheduleGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <button id="panel-arrow" aria-label="Switch panel">&#8250;</button>

    <!-- Mobile right panel for Tasks/Schedule -->
    <div id="mobile-right-panel"></div>
    <div id="mobile-overlay"></div>

  <!-- Global Search & Replace Panel -->
  <div id="global-search-panel" class="gs-hidden">
    <div class="gs-row">
      <input type="text" id="gs-search-input" placeholder="Search all notes&hellip;" autocomplete="off" spellcheck="false">
      <span id="gs-status"></span>
      <button id="gs-find-btn">Find</button>
      <button id="gs-close" title="Close (Esc)">&#x2715;</button>
    </div>
    <div class="gs-row">
      <input type="text" id="gs-replace-input" placeholder="Replace with&hellip;" autocomplete="off" spellcheck="false">
      <button id="gs-replace-btn">Replace</button>
      <button id="gs-replace-all-btn">All</button>
      <label id="gs-case-label" title="Case sensitive"><input type="checkbox" id="gs-case-checkbox"> Aa</label>
    </div>
    <ul id="gs-results"></ul>
  </div>

  <script src="theme-engine.js"></script>
  <script defer src="icloud-bridge.js"></script>
  <script defer src="storage.js"></script>
  <script defer src="app-state.js"></script>
  <script defer src="markdown-renderer.js"></script>
  <script defer src="schedule.js"></script>
  <script defer src="file-list.js"></script>
  <script defer src="note-manager.js"></script>
  <script defer src="export-import.js"></script>
  <script defer src="global-search.js"></script>
  <script defer src="graph-view.js"></script>
  <script defer src="syntax-highlight.js"></script>
  <script defer src="math-eval.js"></script>
  <script defer src="notifications.js"></script>
  <script defer src="calendar-sync.js"></script>
  <script defer src="app-init.js"></script>
</body>
</html>
