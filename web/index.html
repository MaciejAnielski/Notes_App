<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <title>Notes App</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="001_Assets/favicon.ico" type="image/x-icon">
    <script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body>

    <div id="button-container" class="storage-controls">

        <div class="button-group">
            <button id="new-note">New</button>
        </div>
        <div class="button-group">
            <button id="delete-note">Delete</button>
            <div class="sub-buttons">
                <button id="delete-selected" class="sub-button">Filtered</button>
                <button id="delete-all" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="export-note">Export</button>
            <div class="sub-buttons">
                <button id="export-selected" class="sub-button">Filtered</button>
                <button id="export-all-html" class="sub-button">All</button>
            </div>
        </div>
        <div class="button-group tools-collapsible">
            <button id="import-zip">Import</button>
            <input type="file" id="import-zip-input" accept=".zip" style="display:none;">
        </div>
        <div class="button-group tools-collapsible">
            <button id="download-all">Backup</button>
        </div>
        <div class="button-group tools-collapsible">
            <button id="find-btn">Find</button>
        </div>
        <div class="button-group" id="tools-toggle-group">
            <button id="tools-toggle">Tools</button>
        </div>
        <div class="button-group">
            <button id="toggle-view">View</button>
        </div>

    </div>

    <div id="tools-overflow-row"></div>

    <div id="content-area">
      <div id="editor-section">
        <textarea id="editor" placeholder="Start typing here..."></textarea>
        <div id="preview" style="display:none;"></div>
        <div id="bottom-status-area">
          <div id="status-message"></div>
          <div id="last-backup-status"></div>
        </div>
      </div>

      <div id="panel-lists">
        <button id="panel-pin" title="Pin panel">
          <svg width="11" height="14" viewBox="0 0 11 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5.5" cy="4.5" r="3.5" stroke="currentColor" stroke-width="1.5"/>
            <line x1="5.5" y1="8" x2="5.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="files-container" class="active">
          <h2>Notes</h2>
          <input type="text" id="searchBox" placeholder="Search Notes...">
          <ul id="fileList"></ul>
        </div>
        <div id="todo-container">
          <h2>Tasks</h2>
          <input type="text" id="searchTasksBox" placeholder="Search Tasks...">
          <ul id="todoList"></ul>
        </div>
        <div id="schedule-container">
          <h2>Schedule</h2>
          <div id="schedule-week-row"></div>
          <div class="schedule-date-row">
            <button id="schedule-prev" title="Previous week">&lsaquo;</button>
            <span id="schedule-date-label"></span>
            <button id="schedule-next" title="Next week">&rsaquo;</button>
          </div>
          <div id="schedule-timeline-wrapper">
            <div id="scheduleGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <button id="panel-arrow" aria-label="Switch panel">&#8250;</button>

    <!-- Mobile right panel for Tasks/Schedule -->
    <div id="mobile-right-panel"></div>
    <div id="mobile-overlay"></div>

  <!-- Global Search & Replace Panel -->
  <div id="global-search-panel" class="gs-hidden">
    <div class="gs-row">
      <input type="text" id="gs-search-input" placeholder="Search all notes&hellip;" autocomplete="off" spellcheck="false">
      <span id="gs-status"></span>
      <button id="gs-find-btn">Find</button>
      <button id="gs-close" title="Close (Esc)">&#x2715;</button>
    </div>
    <div class="gs-row">
      <input type="text" id="gs-replace-input" placeholder="Replace with&hellip;" autocomplete="off" spellcheck="false">
      <button id="gs-replace-btn">Replace</button>
      <button id="gs-replace-all-btn">All</button>
      <label id="gs-case-label" title="Case sensitive"><input type="checkbox" id="gs-case-checkbox"> Aa</label>
    </div>
    <ul id="gs-results"></ul>
  </div>

  <script defer src="icloud-bridge.js"></script>
  <script defer src="storage.js"></script>
  <script defer src="script.js"></script>
</body>
</html>
