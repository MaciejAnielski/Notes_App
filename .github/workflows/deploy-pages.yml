name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare web deployment (exclude sync/native-only files)
        run: |
          mkdir -p _site
          rsync -av web/ _site/ \
            --exclude='powersync-config.js' \
            --exclude='powersync-storage.js' \
            --exclude='vendor/powersync-bundle.min.js' \
            --exclude='vendor/worker/' \
            --exclude='vendor/*.wasm' \
            --exclude='tests/'

      - name: Upload web folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
